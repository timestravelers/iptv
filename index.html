<!doctype html>
<html lang="id">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>EMTE-TV — TV Langsung Gratis & Lokal</title>
<script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.13/dist/hls.min.js"></script>
<style>
  :root{
    --bg:#070a0f; --panel:#10151e; --panel2:#161d29; --line:#222c3a;
    --txt:#e8edf6; --mut:#8b97ab; --accent:#1a73ff; --accent2:#39d0ff; --ok:#37d67a; --red:#ff4d4d;
    --radius:16px;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:
     radial-gradient(1200px 700px at 80% -10%, #16243f 0%, transparent 60%),
     radial-gradient(900px 600px at -10% 110%, #1a1430 0%, transparent 55%), var(--bg);
     color:var(--txt);font-family:-apple-system,"Segoe UI",Inter,Roboto,Helvetica,Arial,sans-serif;overflow:hidden}
  .app{display:grid;grid-template-columns:330px 1fr 250px;grid-template-rows:64px 1fr;height:100vh;gap:14px;padding:14px}
  /* top bar */
  .top{grid-column:1/4;display:flex;align-items:center;gap:16px;background:linear-gradient(180deg,#151c28,#10151e);
       border:1px solid var(--line);border-radius:var(--radius);padding:0 18px}
  .brand{display:flex;align-items:center;gap:10px;font-weight:800;letter-spacing:.5px;font-size:20px}
  .brand .dot{width:13px;height:13px;border-radius:50%;background:linear-gradient(135deg,var(--accent2),var(--accent));box-shadow:0 0 14px var(--accent2)}
  .brand small{color:var(--mut);font-weight:600;font-size:11px;letter-spacing:2px;text-transform:uppercase}
  .search{flex:1;max-width:520px;margin-left:8px;display:flex;align-items:center;gap:8px;background:#0c111a;border:1px solid var(--line);border-radius:12px;padding:9px 14px}
  .search input{flex:1;background:none;border:0;outline:0;color:var(--txt);font-size:15px}
  select{background:#0c111a;color:var(--txt);border:1px solid var(--line);border-radius:12px;padding:9px 12px;font-size:14px;outline:0;cursor:pointer}
  .top .meta{margin-left:auto;color:var(--mut);font-size:12px;text-align:right;line-height:1.3}
  /* channel list */
  .list{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);display:flex;flex-direction:column;overflow:hidden}
  .list h3{margin:0;padding:14px 16px 10px;font-size:13px;letter-spacing:1.5px;color:var(--mut);text-transform:uppercase}
  .channels{overflow-y:auto;flex:1;padding:0 8px 8px}
  .ch{display:flex;align-items:center;gap:12px;padding:9px 10px;border-radius:12px;cursor:pointer;transition:.12s}
  .ch:hover{background:#192230}
  .ch.sel{background:linear-gradient(90deg,rgba(26,115,255,.25),rgba(26,115,255,.05));outline:1px solid rgba(57,208,255,.4)}
  .ch .logo{width:42px;height:42px;border-radius:10px;background:#0c111a;object-fit:contain;flex:none;display:flex;align-items:center;justify-content:center;font-weight:800;color:var(--accent2);font-size:16px;border:1px solid var(--line)}
  .ch .info{min-width:0}
  .ch .nm{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .ch .sub{font-size:11px;color:var(--mut);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  /* player */
  .stage{display:flex;flex-direction:column;gap:12px;min-width:0}
  .screen{position:relative;flex:1;background:#000;border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;display:flex;align-items:center;justify-content:center}
  video{width:100%;height:100%;object-fit:contain;background:#000}
  .nowbar{display:flex;align-items:center;gap:14px;background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:12px 16px}
  .nowbar .big{font-size:18px;font-weight:700}
  .nowbar .sub{color:var(--mut);font-size:12px}
  .badge{margin-left:auto;font-size:11px;color:var(--mut);border:1px solid var(--line);border-radius:20px;padding:5px 12px}
  .overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;text-align:center;color:var(--mut);padding:20px}
  .spinner{width:46px;height:46px;border:4px solid #1d2735;border-top-color:var(--accent2);border-radius:50%;animation:spin 1s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .standby{position:absolute;inset:0;background:#04060a;display:none;align-items:center;justify-content:center;color:#2a3645;font-size:14px;letter-spacing:3px}
  .chOSD{position:absolute;top:18px;left:18px;background:rgba(6,10,16,.7);backdrop-filter:blur(8px);border:1px solid var(--line);border-radius:12px;padding:10px 16px;font-weight:700;opacity:0;transition:.3s}
  .numOSD{position:absolute;top:18px;right:18px;background:rgba(6,10,16,.8);border:1px solid var(--accent);border-radius:12px;padding:8px 18px;font-size:30px;font-weight:800;color:var(--accent2);opacity:0;transition:.15s}
  /* remote */
  .remote{background:linear-gradient(180deg,#1b2230,#0d111a);border:1px solid #2a3543;border-radius:28px;padding:18px 16px;display:flex;flex-direction:column;align-items:center;gap:12px;box-shadow:inset 0 1px 0 rgba(255,255,255,.06),0 20px 50px rgba(0,0,0,.5);overflow-y:auto}
  .remote .rb{font-size:10px;letter-spacing:3px;color:var(--mut);font-weight:700}
  .btn{width:100%;border:1px solid #2c3848;background:linear-gradient(180deg,#222c3b,#161d28);color:var(--txt);border-radius:12px;padding:10px;font-size:13px;font-weight:600;cursor:pointer;transition:.08s;display:flex;align-items:center;justify-content:center;gap:6px}
  .btn:hover{border-color:var(--accent)}
  .btn:active{transform:translateY(1px);background:#101622}
  .row{display:flex;gap:8px;width:100%}
  .power{width:46px;height:46px;border-radius:50%;border:1px solid #3a2530;background:radial-gradient(circle at 50% 35%,#2a1820,#140d11);color:var(--red);font-size:18px;align-self:flex-end}
  .dpad{position:relative;width:170px;height:170px;border-radius:50%;background:radial-gradient(circle at 50% 40%,#202a39,#11161f);border:1px solid #2c3848;display:grid;place-items:center}
  .dpad button{position:absolute;background:none;border:0;color:var(--txt);font-size:18px;cursor:pointer;width:48px;height:48px;border-radius:10px}
  .dpad button:hover{color:var(--accent2)}
  .dpad .up{top:6px}.dpad .down{bottom:6px}.dpad .left{left:6px}.dpad .right{right:6px}
  .dpad .ok{width:72px;height:72px;border-radius:50%;background:linear-gradient(180deg,#1a73ff,#0c3ea0);color:#fff;font-weight:800;font-size:15px;box-shadow:0 6px 18px rgba(26,115,255,.45)}
  .rocker{flex:1;display:flex;flex-direction:column;border:1px solid #2c3848;border-radius:30px;overflow:hidden}
  .rocker button{background:linear-gradient(180deg,#222c3b,#161d28);border:0;color:var(--txt);padding:10px;font-size:16px;cursor:pointer}
  .rocker button:hover{color:var(--accent2)}
  .rocker .lbl{font-size:9px;letter-spacing:2px;color:var(--mut);text-align:center;padding:4px 0;background:#0d121b}
  .pad{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;width:100%}
  .pad button{aspect-ratio:1.4;border:1px solid #2c3848;background:linear-gradient(180deg,#1d2632,#141a24);color:var(--txt);border-radius:10px;font-size:16px;font-weight:700;cursor:pointer}
  .pad button:hover{border-color:var(--accent)}
  .seg{display:flex;background:#0c111a;border:1px solid var(--line);border-radius:12px;overflow:hidden}
  .seg button{background:none;border:0;color:var(--mut);padding:9px 13px;font-size:14px;font-weight:700;cursor:pointer}
  .seg button.on{background:linear-gradient(180deg,#1f6bff,#0c3ea0);color:#fff}
  .lpad{padding:12px 12px 4px;border-bottom:1px solid var(--line)}
  .chips{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:8px}
  .chip{background:#0e141e;border:1px solid var(--line);color:var(--mut);border-radius:999px;padding:7px 13px;font-size:13px;font-weight:700;cursor:pointer;transition:.12s}
  .chip:hover{border-color:var(--accent);color:var(--txt)}
  .chip.on{background:linear-gradient(180deg,#22324a,#16202e);color:#fff;border-color:var(--accent2);box-shadow:inset 0 0 0 1px rgba(57,208,255,.35)}
  .lhead{font-size:11px;letter-spacing:1.5px;color:var(--mut);text-transform:uppercase;padding:2px 2px 8px}
  .star{margin-left:auto;background:none;border:0;color:#3a4658;font-size:20px;cursor:pointer;flex:none;padding:2px 4px;line-height:1}
  .star:hover{color:#ffcf4d;transform:scale(1.15)}
  .star.on{color:#ffcf4d;text-shadow:0 0 10px rgba(255,207,77,.5)}
  .channels::-webkit-scrollbar,.remote::-webkit-scrollbar{width:8px}
  .channels::-webkit-scrollbar-thumb,.remote::-webkit-scrollbar-thumb{background:#243040;border-radius:8px}
  /* always-visible quick controls (great on phones where the remote is hidden) */
  .controls{display:flex;gap:6px;margin-left:auto;flex-wrap:wrap}
  .controls button{width:42px;height:42px;border-radius:11px;border:1px solid var(--line);background:linear-gradient(180deg,#1d2632,#141a24);color:var(--txt);font-size:17px;cursor:pointer}
  .controls button:hover{border-color:var(--accent)}
  .controls button:active{transform:translateY(1px)}
  @media(max-width:1100px){.app{grid-template-columns:300px 1fr}.remote{display:none}}
  /* phone layout */
  @media(max-width:760px){
    html,body{overflow:auto}
    .app{display:flex;flex-direction:column;height:auto;min-height:100dvh;padding:8px;gap:8px}
    .top{flex-wrap:wrap;height:auto;padding:8px 10px;gap:8px;order:1}
    .brand{font-size:17px}
    .search{order:9;flex-basis:100%;max-width:none}
    .top select{flex:1;min-width:120px}
    .top .meta{display:none}
    .stage{order:2}
    .screen{height:32vh;min-height:200px}
    .nowbar{flex-wrap:wrap}
    .controls{width:100%;justify-content:space-between;margin-top:8px}
    .controls button{flex:1}
    .list{order:3;min-height:46vh}
  }
</style>
</head>
<body>
<div class="app">
  <div class="top">
    <div class="brand"><span class="dot"></span>EMTE-TV <small>Langsung</small></div><span id="tvnav" style="display:flex;gap:6px;margin-left:4px"><a href="https://thorik78.vercel.app" style="color:#9fb3d9;text-decoration:none;font-size:13px;font-weight:600;white-space:nowrap;padding:6px 8px">&#8962; Beranda</a><a href="/" style="color:#9fb3d9;text-decoration:none;font-size:13px;font-weight:600;white-space:nowrap;padding:6px 8px">&#8801; Aplikasi</a></span>
    <div class="search">🔎<input id="q" placeholder="Cari saluran…" autocomplete="off"/></div>
    <div class="seg" id="countrySeg">
      <button data-c="ID" class="on">🇮🇩 ID</button>
      <button data-c="US">🇺🇸 US</button>
      <button data-c="UK">🇬🇧 UK</button>
      <button data-c="BOTH">Semua</button>
    </div>
    <label style="display:flex;align-items:center;gap:6px;color:var(--mut);font-size:12px;cursor:pointer;white-space:nowrap"><input type="checkbox" id="vonly" checked> Hanya terverifikasi</label>
    <div class="meta" id="meta">Memuat saluran…</div>
  </div>

  <div class="list">
    <div class="lpad"><div class="chips" id="chips"></div><div class="lhead" id="listhead">Saluran</div></div>
    <div class="channels" id="channels"></div>
  </div>

  <div class="stage">
    <div class="screen">
      <video id="video" playsinline x-webkit-airplay="allow"></video>
      <div class="standby" id="standby">SIAGA</div>
      <div class="chOSD" id="chosd"></div>
      <div class="numOSD" id="numosd"></div>
      <div class="overlay" id="overlay"><div class="spinner"></div><div>Pilih saluran untuk mulai menonton</div></div>
    </div>
    <div class="nowbar">
      <div><div class="big" id="nowName">Tidak ada saluran</div><div class="sub" id="nowSub">TV langsung gratis & lokal · siaran publik</div></div>
      <div class="badge" id="nowBadge">—</div>
      <div class="controls">
        <button onclick="R.chan(-1)" title="Saluran sebelumnya">⏮</button>
        <button onclick="R.playpause()" title="Putar / Jeda">⏯</button>
        <button onclick="R.chan(1)" title="Saluran berikutnya">⏭</button>
        <button onclick="R.mute()" title="Bisukan">🔇</button>
        <button onclick="R.cast()" title="Siaran ke TV">📺</button>
        <button onclick="R.pip()" title="Jendela mengambang">🗗</button>
        <button onclick="R.screen2()" title="Buka saluran ini di jendela kedua">⧉</button>
        <button onclick="R.full()" title="Layar penuh">⛶</button>
      </div>
    </div>
  </div>

  <div class="remote">
    <button class="power btn" title="Siaga" onclick="R.power()">⏻</button>
    <div class="rb">NOVA · REMOTE</div>
    <div class="dpad">
      <button class="up" onclick="R.nav(-1)">▲</button>
      <button class="down" onclick="R.nav(1)">▼</button>
      <button class="left" onclick="R.side(-1)">◄</button>
      <button class="right" onclick="R.side(1)">►</button>
      <button class="ok" onclick="R.ok()">OK</button>
    </div>
    <div class="row">
      <div class="rocker"><button onclick="R.vol(.1)">＋</button><div class="lbl">VOL</div><button onclick="R.vol(-.1)">－</button></div>
      <div class="rocker"><button onclick="R.chan(-1)">∧</button><div class="lbl">CH</div><button onclick="R.chan(1)">∨</button></div>
    </div>
    <div class="row">
      <button class="btn" onclick="R.mute()">🔇 Bisukan</button>
      <button class="btn" onclick="R.guide()">☰ Panduan</button>
    </div>
    <div class="pad">
      <button onclick="R.num(1)">1</button><button onclick="R.num(2)">2</button><button onclick="R.num(3)">3</button>
      <button onclick="R.num(4)">4</button><button onclick="R.num(5)">5</button><button onclick="R.num(6)">6</button>
      <button onclick="R.num(7)">7</button><button onclick="R.num(8)">8</button><button onclick="R.num(9)">9</button>
      <button onclick="R.back()">↩</button><button onclick="R.num(0)">0</button><button onclick="R.home()">⌂</button>
    </div>
    <div class="row">
      <button class="btn" id="ppBtn" onclick="R.playpause()">⏸ Jeda</button>
      <button class="btn" onclick="R.cast()">📺 Siarkan</button>
    </div>
    <div class="row">
      <button class="btn" onclick="R.full()">⛶ Layar Penuh</button>
      <button class="btn" onclick="R.pip()">🗗 Cermin</button>
    </div>
    <div class="row">
      <button class="btn" onclick="R.screen2()">⧉ Layar Kedua</button>
    </div>
  </div>
</div>

<script>
const API='https://iptv-org.github.io/api/';
const $=s=>document.querySelector(s);
const video=$('#video');
let ALL=[], view=[], selIdx=0, current=null, hls=null, numBuf='', numTimer=null;
let favSet=new Set(JSON.parse(localStorage.getItem('EMTE-TV_favs')||'[]'));
let countrySel='ID', activeFilter='all';

const el={channels:$('#channels'),q:$('#q'),countrySeg:$('#countrySeg'),chips:$('#chips'),meta:$('#meta'),
  overlay:$('#overlay'),standby:$('#standby'),nowName:$('#nowName'),nowSub:$('#nowSub'),nowBadge:$('#nowBadge'),
  chosd:$('#chosd'),numosd:$('#numosd'),listhead:$('#listhead'),vonly:$('#vonly')};

async function boot(){
  try{
    const [countries,categories,channels,streams]=await Promise.all(
      ['countries.json','categories.json','channels.json','streams.json'].map(f=>fetch(API+f).then(r=>r.json())));
    const catName={}; categories.forEach(c=>catName[c.id]=c.name);
    const co={}; countries.forEach(c=>co[c.code]={name:c.name,flag:c.flag});
    // map channel -> best stream url
    const sByCh={};
    for(const s of streams){ if(!s.channel||!s.url) continue; (sByCh[s.channel]=sByCh[s.channel]||[]).push(s.url); }
    const pick=urls=>{ const https=urls.filter(u=>u.startsWith('https')); const m3u8=(https.length?https:urls).filter(u=>u.includes('.m3u8')); return (m3u8[0]||https[0]||urls[0]); };
    // Saluran lokal Indonesia (contoh umum)
    const LOCAL_ID=/\b(RCTI|MNCTV|GTV|ANTV|Trans7|TransTV|NET\.TV|MetroTV|TVRI|RCTI\+|INews|KompasTV|CNNIndonesia|BTV|RTV|OChannel)\b/i;
    ALL = channels.filter(c=>!c.is_nsfw && sByCh[c.id] && (['ID','US','UK'].includes(c.country))).map(c=>({
      id:c.id,name:c.name,logo:c.logo,country:c.country,
      cats:(c.categories||[]).map(id=>catName[id]).filter(Boolean),
      flag:(co[c.country]||{}).flag||(c.country==='ID'?'🇮🇩':(c.country==='UK'?'🇬🇧':'🌐')), 
      countryName:(co[c.country]||{}).name||c.country,
      url:pick(sByCh[c.id]), state:'unknown',
      local: c.country==='ID' && LOCAL_ID.test((c.name||'')+' '+((c.alt_names||[]).join(' '))),
      network: c.network||'', alt:(c.alt_names||[])[0]||''
    }));
    // Tambahkan saluran Indonesia manual (opsional)
    ALL.push({
      id:'tvri-nasional', name:'TVRI Nasional', logo:'',
      country:'ID', cats:['Berita'], flag:'🇮🇩', countryName:'Indonesia',
      url:'https://tvridigital-lh.akamaihd.net/i/tvrinasional_1@358927/master.m3u8',
      state:'unknown', local:true, network:'TVRI', alt:'Saluran nasional'
    },{
      id:'kompas-tv', name:'Kompas TV', logo:'',
      country:'ID', cats:['Berita'], flag:'🇮🇩', countryName:'Indonesia',
      url:'https://kompastv-live.stream.kata.ai/kompastv/sa_dash_vmx/index.m3u8',
      state:'unknown', local:true, network:'KompasTV', alt:'Berita terkini'
    });
    buildChips();
    [...el.countrySeg.children].forEach(b=>b.onclick=()=>{countrySel=b.dataset.c;
      [...el.countrySeg.children].forEach(x=>x.classList.toggle('on',x===b));selIdx=0;render();});
    render();
    const last=localStorage.getItem('EMTE-TV_last'); if(last){const i=view.findIndex(c=>c.id===last); if(i>=0){selIdx=i;highlight();}}
  }catch(e){ el.meta.textContent='Gagal memuat daftar saluran (periksa koneksi internet).'; console.error(e); }
}

let verifiedOnly=true, verifying=false, scanned=0, scanTotal=0;
const VERIFY_CAP=180;

function matches(){
  const q=el.q.value.trim().toLowerCase();
  const cs=countrySel==='BOTH'?['ID','US','UK']:[countrySel];
  return ALL.filter(c=>{
    if(!cs.includes(c.country))return false;
    if(q && !c.name.toLowerCase().includes(q))return false;
    if(activeFilter==='local')return c.local;
    if(activeFilter==='fav')return favSet.has(c.id);
    if(activeFilter!=='all')return c.cats.includes(activeFilter);
    return true;
  });
}
function buildChips(){
  const cats=['Berita','Olahraga','Film','Hiburan','Dokumenter','Musik','Anak','Gaya Hidup','Bisnis','Komedi','Cuaca'].filter(cat=>ALL.some(c=>c.cats.includes(cat)));
  const items=[{k:'all',l:'Semua'},{k:'local',l:'📍 Lokal'},{k:'fav',l:`⭐ Favorit${favSet.size?` (${favSet.size})`:''}`},...cats.map(c=>({k:c,l:c}))];
  el.chips.innerHTML=items.map(it=>`<button class="chip ${activeFilter===it.k?'on':''}" data-k="${it.k}">${it.l}</button>`).join('');
  [...el.chips.children].forEach(b=>b.onclick=()=>{activeFilter=b.dataset.k;buildChips();selIdx=0;render();});
}
function toggleFav(id){ favSet.has(id)?favSet.delete(id):favSet.add(id);
  try{localStorage.setItem('EMTE-TV_favs',JSON.stringify([...favSet]));}catch(e){}
  buildChips(); renderList(); }
function applyFilters(){
  let m=matches().filter(c=>c.state!=='dead');
  if(verifiedOnly) m=m.filter(c=>c.state==='live');
  m.sort((a,b)=>((a.state==='live'?0:1)-(b.state==='live'?0:1))||a.name.localeCompare(b.name));
  view=m;
}
function statusDot(c){const col=c.state==='live'?'#37d67a':(c.state==='dead'?'#ff4d4d':'#e6b53b');
  return `<span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${col};margin-right:5px;vertical-align:middle"></span>`;}
function renderList(){
  applyFilters();
  selIdx=Math.max(0,Math.min(selIdx,Math.max(0,view.length-1)));
  const cap=600, shown=view.slice(0,cap);
  if(!shown.length){
    el.channels.innerHTML=`<div style="padding:40px 16px;text-align:center;color:var(--mut)">${verifying?'<div class="spinner" style="margin:0 auto 14px"></div>Memindai siaran publik yang benar-benar bisa diputar…':'Tidak ada saluran aktif dalam filter ini. Coba ganti negara/kategori, atau matikan “Hanya terverifikasi”.'}</div>`;
  } else {
    el.channels.innerHTML=shown.map((c,i)=>`
      <div class="ch ${i===selIdx?'sel':''}" data-i="${i}">
        ${c.logo?`<img class="logo" src="${c.logo}" loading="lazy" onerror="this.replaceWith(Object.assign(document.createElement('div'),{className:'logo',textContent:'${(c.name[0]||'?').replace(/[^A-Za-z0-9]/g,'')||'?'}'}))">`
                :`<div class="logo">${(c.name[0]||'?')}</div>`}
        <div class="info"><div class="nm">${statusDot(c)}${c.flag} ${escapeHtml(c.name)}${c.network?` <span style="font-size:10px;color:#ffd27a;border:1px solid #5a4a25;border-radius:6px;padding:1px 5px;vertical-align:middle">${escapeHtml(c.network)}</span>`:''}${c.local?' <span style="font-size:10px;color:#39d0ff;border:1px solid #2c4763;border-radius:6px;padding:1px 5px;vertical-align:middle">Lokal</span>':''}</div><div class="sub">${escapeHtml(c.network?(c.network+(c.alt?' · '+c.alt:'')):(c.cats.slice(0,3).join(' · ')||c.countryName))}</div></div>
        <button class="star ${favSet.has(c.id)?'on':''}" title="Favorit">${favSet.has(c.id)?'★':'☆'}</button>
      </div>`).join('');
  }
  const live=matches().filter(c=>c.state==='live').length;
  el.listhead.textContent=`Saluran — ${live} aktif${verifying?` · memindai ${scanned}/${scanTotal}…`:''}`;
  el.meta.innerHTML=`<b>${ALL.length}</b> dalam katalog<br>${live} bisa diputar di browser${verifying?` · memindai…`:''}`;
  [...el.channels.children].forEach(node=>{ if(node.dataset.i===undefined)return;
    const ch=view[+node.dataset.i];
    node.onclick=()=>{selIdx=+node.dataset.i;play(ch);highlight();};
    const s=node.querySelector('.star'); if(s)s.onclick=e=>{e.stopPropagation();toggleFav(ch.id);};
  });
}
let _gen=0,_rt=null;
function scheduleRender(){clearTimeout(_rt);_rt=setTimeout(renderList,300);}
function hlsCheck(url){return new Promise(resolve=>{
  let done=false; const v=document.createElement('video'); v.muted=true;
  const finish=ok=>{ if(done)return; done=true; clearTimeout(to); try{if(h)h.destroy();}catch(e){} try{v.removeAttribute('src');v.load();}catch(e){} resolve(ok); };
  const to=setTimeout(()=>finish(false),7000);
  let h=null;
  if(url.includes('.m3u8') && window.Hls && Hls.isSupported()){
    h=new Hls({maxBufferLength:3,manifestLoadingTimeOut:6000,fragLoadingTimeOut:6000});
    h.on(Hls.Events.FRAG_LOADED,()=>finish(true));
    h.on(Hls.Events.ERROR,(e,d)=>{ if(d.fatal)finish(false); });
    h.loadSource(url); h.attachMedia(v);
  } else {
    v.src=url; v.oncanplay=()=>finish(true); v.onerror=()=>finish(false); v.load();
  }
});}
function verifyVisible(){
  const myGen=++_gen;
  const cands=matches().filter(c=>c.state==='unknown').slice(0,VERIFY_CAP);
  scanTotal=cands.length; scanned=0; verifying=cands.length>0;
  if(!verifying){renderList();return;}
  renderList();
  let i=0,active=0;
  (function next(){ if(myGen!==_gen)return;
    if(i>=cands.length && active===0){ verifying=false; scheduleRender(); return; }
    while(active<6 && i<cands.length){ const ch=cands[i++]; active++;
      hlsCheck(ch.url).then(ok=>{ch.state=ok?'live':'dead'; scanned++; if(ok)scheduleRender();})
        .finally(()=>{active--; if(myGen===_gen) next();});
    }
  })();
}
function render(){ renderList(); verifyVisible(); }
function highlight(){[...el.channels.children].forEach((n,i)=>n.classList.toggle('sel',i===selIdx));
  const cur=el.channels.children[selIdx]; if(cur)cur.scrollIntoView({block:'nearest'});}
function escapeHtml(s){return (s||'').replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));}

function play(ch){
  if(!ch)return; current=ch;
  try{localStorage.setItem('EMTE-TV_last',ch.id);}catch(e){}
  el.standby.style.display='none';
  el.overlay.style.display='flex'; el.overlay.lastChild.textContent='Mengatur '+ch.name+'…';
  el.nowName.textContent=ch.name; el.nowSub.textContent=`${ch.flag} ${ch.countryName} · ${ch.cats.slice(0,3).join(' · ')||'Langsung'}`;
  el.nowBadge.textContent='LANGSUNG';
  el.chosd.textContent=ch.flag+' '+ch.name; el.chosd.style.opacity=1; clearTimeout(play._t); play._t=setTimeout(()=>el.chosd.style.opacity=0,2200);
  if(hls){hls.destroy();hls=null;}
  const url=ch.url;
  const onErr=()=>{el.overlay.style.display='flex';el.overlay.lastChild.textContent='⚠ Siaran ini sedang offline — telah dihapus dari daftar. Pilih yang lain.';el.overlay.querySelector('.spinner').style.display='none';
    if(current){current.state='dead'; scheduleRender();}};
  const onPlay=()=>{el.overlay.style.display='none';};
  el.overlay.querySelector('.spinner').style.display='block';
  if(url.includes('.m3u8') && window.Hls && Hls.isSupported()){
    hls=new Hls({maxBufferLength:20});
    hls.loadSource(url); hls.attachMedia(video);
    hls.on(Hls.Events.MANIFEST_PARSED,()=>video.play().then(onPlay).catch(onPlay));
    hls.on(Hls.Events.ERROR,(e,d)=>{ if(d.fatal)onErr(); });
  } else {
    video.src=url; video.play().then(onPlay).catch(onErr); video.onerror=onErr;
  }
}

// ---- remote / keyboard ----
const R={
  power(){ if(el.standby.style.display==='flex'){el.standby.style.display='none'; if(current)play(current);}
           else{ if(hls){hls.destroy();hls=null;} video.pause(); video.removeAttribute('src'); video.load(); el.standby.style.display='flex'; el.overlay.style.display='none'; } },
  nav(d){ selIdx=Math.max(0,Math.min(view.length-1,selIdx+d)); highlight(); },
  side(d){ selIdx=Math.max(0,Math.min(view.length-1,selIdx+d*10)); highlight(); },
  ok(){ if(view[selIdx])play(view[selIdx]); },
  vol(d){ video.muted=false; video.volume=Math.max(0,Math.min(1,+(video.volume+d).toFixed(2))); flashNum('VOL '+Math.round(video.volume*100)); },
  chan(d){ if(!view.length)return; selIdx=(selIdx+d+view.length)%view.length; highlight(); play(view[selIdx]); },
  mute(){ video.muted=!video.muted; flashNum(video.muted?'BISU':'SUARA'); },
  guide(){ const l=document.querySelector('.list'); l.style.display=l.style.display==='none'?'flex':'none'; },
  num(n){ numBuf+=n; el.numosd.textContent=numBuf; el.numosd.style.opacity=1; clearTimeout(numTimer);
          numTimer=setTimeout(()=>{ const i=parseInt(numBuf,10)-1; numBuf=''; el.numosd.style.opacity=0;
            if(i>=0&&i<view.length){selIdx=i;highlight();play(view[i]);} },1100); },
  back(){ el.q.value='';render(); },
  home(){ el.q.value=''; render(); },
  full(){ const s=document.querySelector('.screen'); if(!document.fullscreenElement)s.requestFullscreen?.(); else document.exitFullscreen?.(); },
  playpause(){ if(video.paused){video.play().catch(()=>{});} else video.pause(); },
  async pip(){
    try{ if(document.pictureInPictureElement) await document.exitPictureInPicture();
         else if(video.requestPictureInPicture) await video.requestPictureInPicture();
         else flashNum('Fitur mengambang tidak didukung'); }catch(e){ flashNum('Tidak tersedia'); } },
  screen2(){
    if(!current){flashNum('Pilih saluran dulu');return;}
    const ch=current;
    const html='<!doctype html><html><head><meta charset=utf-8><title>'+escapeHtml(ch.name)+' — Layar 2</title>'
      +'<script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.13/dist/hls.min.js"><\/script>'
      +'<style>html,body{margin:0;height:100%;background:#000;overflow:hidden}video{width:100vw;height:100vh;object-fit:contain}'
      +'.b{position:fixed;top:10px;right:10px;z-index:9;background:rgba(0,0,0,.55);color:#fff;border:1px solid #555;border-radius:10px;padding:9px 14px;font:14px sans-serif;cursor:pointer}'
      +'.t{position:fixed;top:10px;left:12px;color:#fff;font:600 15px sans-serif;text-shadow:0 1px 4px #000;opacity:.85}</style></head>'
      +'<body><video id=v playsinline x-webkit-airplay="allow" controls></video>'
      +'<div class=t>'+escapeHtml(ch.flag+" "+ch.name)+'</div>'
      +'<button class=b onclick="var e=document.documentElement;e.requestFullscreen&&e.requestFullscreen()">⛶ Layar Penuh</button>'
      +'<script>var u='+JSON.stringify(ch.url)+';var v=document.getElementById("v");'
      +'if(u.indexOf(".m3u8")>-1&&window.Hls&&Hls.isSupported()){var h=new Hls();h.loadSource(u);h.attachMedia(v);h.on(Hls.Events.MANIFEST_PARSED,function(){v.play()});}'
      +'else{v.src=u;v.play();}<\/script></body></html>';
    const w=window.open('','EMTE-TV_s2_'+Date.now(),'width=960,height=560');
    if(!w){flashNum('Izinkan pop-up untuk layar kedua');return;}
    w.document.open(); w.document.write(html); w.document.close();
    flashNum('Membuka "'+ch.name+'" di jendela baru');
  },
  async cast(){
    try{
      if(video.remote && typeof video.remote.prompt==='function'){ await video.remote.prompt(); return; }
    }catch(e){}
    if(typeof video.webkitShowPlaybackTargetPicker==='function'){ video.webkitShowPlaybackTargetPicker(); return; }
    if(video.requestPictureInPicture){ this.pip(); flashNum('Tidak ada perangkat siaran — dibuka mengambang'); return; }
    flashNum('Siaran tidak didukung di sini');
  }
};
video.addEventListener('play',()=>{const b=document.getElementById('ppBtn'); if(b)b.textContent='⏸ Jeda';});
video.addEventListener('pause',()=>{const b=document.getElementById('ppBtn'); if(b)b.textContent='▶ Putar';});
function flashNum(t){el.numosd.textContent=t;el.numosd.style.opacity=1;clearTimeout(numTimer);numTimer=setTimeout(()=>el.numosd.style.opacity=0,900);}

el.q.addEventListener('input',()=>{selIdx=0;render();});
el.vonly.addEventListener('change',()=>{verifiedOnly=el.vonly.checked;selIdx=0;render();});
addEventListener('keydown',e=>{
  if(e.target.tagName==='INPUT')return;
  const k=e.key;
  if(k==='ArrowUp'){R.nav(-1);e.preventDefault();}
  else if(k==='ArrowDown'){R.nav(1);e.preventDefault();}
  else if(k==='ArrowLeft')R.side(-1);
  else if(k==='ArrowRight')R.side(1);
  else if(k==='Enter')R.ok();
  else if(k==='+'||k==='=')R.vol(.1);
  else if(k==='-')R.vol(-.1);
  else if(k.toLowerCase()==='m')R.mute();
  else if(k===' '||k.toLowerCase()==='k'){R.playpause();e.preventDefault();}
  else if(k.toLowerCase()==='c')R.cast();
  else if(k.toLowerCase()==='p')R.pip();
  else if(k.toLowerCase()==='f')R.full();
  else if(k==='PageUp')R.chan(-1);
  else if(k==='PageDown')R.chan(1);
  else if(/[0-9]/.test(k))R.num(+k);
});
boot();
</script>
